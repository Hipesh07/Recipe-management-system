spring.application.name=recipe-manager

# H2 file-based database — data persists in ./data/recipedb.mv.db between restarts
spring.datasource.url=jdbc:h2:file:./data/recipedb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 console (visit http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080

# JWT
# NOTE: replace this with a securely generated secret (env var, not committed)
# before deploying to production.
app.jwt.secret=change-this-super-secret-key-before-production-min-32-chars
app.jwt.expiration-ms=86400000

# Never expose stack traces / internal error messages to clients.
# GlobalExceptionHandler returns clean, generic error bodies instead.
server.error.include-message=never
server.error.include-stacktrace=never

logging.level.org.springframework.web=INFO
logging.level.org.hibernate=ERROR
logging.level.org.springframework.security=INFO